<!-- ==================== OVERLAYS DO HELPZONE ==================== -->

<!-- MODAL: CRIAR POST -->
<div class="hz-overlay" id="createPostOverlay">
    <div class="hz-overlay-backdrop" onclick="closeCreatePostModal()"></div>
    <div class="hz-modal hz-modal-create">
        <div class="hz-modal-header">
            <h3>Criar Post</h3>
            <button class="hz-modal-close" onclick="closeCreatePostModal()">
                <i class="fas fa-times"></i>
            </button>
        </div>
        
        <div class="hz-modal-body">
            <form id="createPostForm" enctype="multipart/form-data">
                <!-- Área de Texto -->
                <div class="form-group">
                    <textarea 
                        id="postTexto" 
                        name="texto" 
                        class="hz-textarea" 
                        placeholder="No que você está pensando?"
                        rows="4"
                        maxlength="500"
                    ></textarea>
                    <div class="char-counter">
                        <span id="charCount">0</span>/500
                    </div>
                </div>
                
                <!-- Preview de Mídia -->
                <div class="media-preview" id="mediaPreview" style="display: none;">
                    <div class="media-preview-container">
                        <img id="imagePreview" style="display: none;" alt="Preview">
                        <video id="videoPreview" style="display: none;" controls></video>
                        <button type="button" class="media-remove" onclick="removeMedia()">
                            <i class="fas fa-times"></i>
                        </button>
                    </div>
                </div>
                
                <!-- Ações -->
                <div class="hz-modal-actions">
                    <div class="media-options">
                        <label class="media-btn" title="Adicionar imagem">
                            <i class="fas fa-image"></i>
                            <input type="file" id="imageInput" accept="image/*" style="display: none;" onchange="handleImageSelect(event)">
                        </label>
                        <label class="media-btn" title="Adicionar vídeo">
                            <i class="fas fa-video"></i>
                            <input type="file" id="videoInput" accept="video/*" style="display: none;" onchange="handleVideoSelect(event)">
                        </label>
                    </div>
                    
                    <button type="submit" class="btn-primary" id="submitPostBtn">
                        <span class="btn-text">Publicar</span>
                        <span class="btn-loading" style="display: none;">
                            <i class="fas fa-spinner fa-spin"></i> Publicando...
                        </span>
                    </button>
                </div>
            </form>
        </div>
    </div>
</div>

<!-- MODAL: EXPLORAR / BUSCA -->
<div class="hz-overlay" id="searchOverlay">
    <div class="hz-overlay-backdrop" onclick="closeSearchModal()"></div>
    <div class="hz-modal hz-modal-search">
        <div class="hz-modal-header">
            <div class="search-input-container">
                <i class="fas fa-search"></i>
                <input 
                    type="text" 
                    id="searchInput" 
                    placeholder="Buscar pessoas, posts ou hashtags..."
                    autocomplete="off"
                >
                <button class="search-clear" onclick="clearSearch()" style="display: none;">
                    <i class="fas fa-times"></i>
                </button>
            </div>
            <button class="hz-modal-close" onclick="closeSearchModal()">
                <i class="fas fa-times"></i>
            </button>
        </div>
        
        <!-- Tabs -->
        <div class="search-tabs">
            <button class="search-tab active" data-tab="pessoas" onclick="switchSearchTab('pessoas')">
                <i class="fas fa-users"></i> Pessoas
            </button>
            <button class="search-tab" data-tab="posts" onclick="switchSearchTab('posts')">
                <i class="fas fa-images"></i> Posts
            </button>
            <button class="search-tab" data-tab="hashtags" onclick="switchSearchTab('hashtags')">
                <i class="fas fa-hashtag"></i> Hashtags
            </button>
        </div>
        
        <div class="hz-modal-body">
            <!-- Conteúdo de Busca -->
            <div id="searchResults">
                <div class="search-empty">
                    <i class="fas fa-search" style="font-size: 3rem; opacity: 0.3;"></i>
                    <p>Digite algo para buscar</p>
                </div>
            </div>
            
            <!-- Loading -->
            <div id="searchLoading" style="display: none;">
                <div class="loading-spinner">
                    <i class="fas fa-spinner fa-spin"></i>
                    <p>Buscando...</p>
                </div>
            </div>
        </div>
    </div>
</div>

<!-- MODAL: NOTIFICAÇÕES -->
<div class="hz-overlay" id="notificationsOverlay">
    <div class="hz-overlay-backdrop" onclick="closeNotificationsPanel()"></div>
    <div class="hz-panel hz-panel-notifications">
        <div class="hz-panel-header">
            <h3>Notificações</h3>
            <button class="hz-modal-close" onclick="closeNotificationsPanel()">
                <i class="fas fa-times"></i>
            </button>
        </div>
        
        <div class="hz-panel-body">
            <!-- Lista de Notificações -->
            <div id="notificationsList">
                <div class="notifications-loading">
                    <i class="fas fa-spinner fa-spin"></i>
                    <p>Carregando notificações...</p>
                </div>
            </div>
        </div>
    </div>
</div>

<style>

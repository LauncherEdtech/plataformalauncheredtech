<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Meu Progresso</title>

  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">

  <style>
    body {
      background: linear-gradient(to bottom, #005F6B 0%, #000000 25%, #000 40%, #000 100%);
      color: white;
      font-family: Arial, sans-serif;
      padding: 2rem;
      text-align: center;
    }

    .summary-container, .time-container {
      display: flex;
      justify-content: center;
      gap: 1rem;
      flex-wrap: wrap;
      margin-bottom: 1.5rem;
    }

    .summary-card, .time-card {
      display: inline-flex;
      align-items: center;
      gap: 0.5rem;
      background-color: rgba(0, 86, 91);
      border: 1px solid rgba(255, 255, 255, 0.4);
      border-radius: 10px;
      padding: 0.7rem 1.2rem;
      min-width: 150px;
      text-align: left;
      transition: transform 0.3s ease;
    }

    .summary-card:hover, .time-card:hover {
      transform: translateY(-3px);
    }

    .summary-icon {
      font-size: 1.8rem;
    }

    .summary-value {
      font-size: 1.3rem;
      font-weight: bold;
      margin: 0;
    }

    .summary-title {
      font-size: 0.85rem;
      margin: 0;
      opacity: 0.8;
    }

    .time-card {
      justify-content: center;
      text-align: center;
      flex-direction: column;
      gap: 0;
    }

    .chart-container {
      background-color: rgba(30, 30, 30, 0.8);
      border-radius: 10px;
      padding: 1rem;
      max-width: 700px;
      margin: 0 auto;
    }
  </style>
</head>

<body>

  <h1 class="mb-2">Meu Progresso</h1>
  <p class="mb-4">Estude com inteligência: acompanhe sua evolução e veja, com dados, como potencializar seus resultados.</p>

  <div class="summary-container">
    <div class="summary-card">
      <i class="bi bi-hexagon-fill text-warning summary-icon"></i>
      <div>
        <p class="summary-value">2.400</p>
        <p class="summary-title">XP acumulado</p>
      </div>
    </div>

    <div class="summary-card">
      <i class="bi bi-file-earmark-text text-warning summary-icon"></i>
      <div>
        <p class="summary-value">8</p>
        <p class="summary-title">Simulados Feitos</p>
      </div>
    </div>

    <div class="summary-card">
      <i class="bi bi-cpu text-warning summary-icon"></i>
      <div>
        <p class="summary-value">14</p>
        <p class="summary-title">Conteúdos Vistos</p>
      </div>
    </div>
  </div>

  <h5 class="mb-3">Tempo de Estudo</h5>

  <div class="time-container">
    <div class="time-card">
      <p class="summary-value">1h20</p>
      <p class="summary-title">Hoje</p>
    </div>

    <div class="time-card">
      <p class="summary-value">5h45</p>
      <p class="summary-title">Esta Semana</p>
    </div>

    <div class="time-card">
      <p class="summary-value">22h10</p>
      <p class="summary-title">Este mês</p>
    </div>
  </div>

  <h5 class="mb-3">Evolução Semanal <small class="text-muted">Ganhos de XP</small></h5>
  <div class="chart-container">
    <canvas id="graficoEvolucao"></canvas>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <script>
    const ctx = document.getElementById('graficoEvolucao').getContext('2d');
    const graficoEvolucao = new Chart(ctx, {
      type: 'line',
      data: {
        labels: ['21/04', '22/04', '23/04', '24/04'],
        datasets: [{
          label: 'XP',
          data: [450, 500, 600, 680],
          backgroundColor: 'rgba(0, 123, 255, 0.2)',
          borderColor: 'rgba(0, 123, 255, 1)',
          borderWidth: 2,
          tension: 0.3,
          pointBackgroundColor: 'rgba(0, 123, 255, 1)',
          pointBorderColor: '#fff',
          pointRadius: 5
        }]
      },
      options: {
        responsive: true,
        scales: {
          y: {
            beginAtZero: true,
            ticks: { color: 'rgba(255,255,255,0.7)' },
            grid: { color: 'rgba(255,255,255,0.1)' }
          },
          x: {
            ticks: { color: 'rgba(255,255,255,0.7)' },
            grid: { color: 'rgba(255,255,255,0.1)' }
          }
        },
        plugins: {
          legend: { labels: { color: 'rgba(255,255,255,0.7)' } }
        }
      }
    });
  </script>

</body>
</html>
